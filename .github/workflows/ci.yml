name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
      - run: npm ci

      - name: Cloud functions TypeScript build
        run: npm run build:cloudfunctions:ts

      - name: TypeScript type check
        run: npm run typecheck

      - name: Unit tests (all cloud functions + frontend)
        run: npx jest

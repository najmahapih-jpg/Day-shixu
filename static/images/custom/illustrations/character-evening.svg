  <!-- Music note floating -->
  <path d="M 155 70 L 155 55 L 165 60 L 165 65 L 158 60 L 158 72 M 153 72 C 150 72, 148 70, 148 68 C 148 65, 150 63, 153 63 C 156 63, 158 65, 158 68 C 158 70, 156 72, 153 72 Z" fill="#1A1A1A" />


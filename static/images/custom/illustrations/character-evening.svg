  <path d="M 125 90 C 128 93, 132 93, 135 90" fill="none" stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round" />
  
  <path d="M 115 100 L 115 110 L 112 110" fill="none" stroke="#1A1A1A" stroke-width="2" stroke-linejoin="miter" stroke-linecap="round" />

  <!-- Subtle relaxed smile -->

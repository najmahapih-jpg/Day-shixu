  <path d="M 140 140 C 130 160, 125 170, 115 180" fill="none" stroke="#1A1A1A" stroke-width="2.5" />
  <path d="M 80 140 L 95 165 L 105 150 L 115 165 L 130 140" fill="none" stroke="#1A1A1A" stroke-width="2.5" stroke-linejoin="round" />


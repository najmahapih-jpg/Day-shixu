<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 220">
  <!-- 
    Claude-inspired Editorial Illustration Style (LOW CONTRAST WATERCOLOR BACKGROUND)
    - ViewBox 750x220 for Cards
    - This is a deeply receding background layer for text readability.
    - Theme: "Rhythm" / "Vibe"
    
    Palette (Strict, High Transparency Application):
    Purple/Core Glow: #B8A9C9 (8%)
    Red/Waveforms: #E8725C (10%)
    Yellow/Dots: #F5C563 (12%)
    Grey/Ground Line: #D4CEC8 (8%)
    (No #2D2A26 used here at all to preserve low contrast)
  -->

  <!-- Transparent Background Area -->
  <rect width="750" height="220" fill="transparent" />

  <!-- The "Rhythm" Background Wash (Right Side Focus) -->
  <!-- Huge diffuse purple blob acting as the main aura -->
  <circle cx="600" cy="110" r="150" fill="#B8A9C9" opacity="0.08" />
  <!-- Overlapping secondary purple wash to create watercolor edge -->
  <path d="M 450 60 C 650 -20, 800 150, 700 250 C 600 350, 400 250, 450 60 Z" fill="#B8A9C9" opacity="0.06" />

  <!-- Faint purple hand-drawn decorative rings inside the aura -->
  <ellipse cx="600" cy="110" rx="90" ry="80" stroke="#B8A9C9" stroke-width="2" fill="none" opacity="0.1" stroke-dasharray="10 20" stroke-linecap="round" />

  <!-- Left Side: Rhythmic Music/Waveforms (Red) -->
  <!-- These are sweeping, parallel curves implying sound or habit rhythm -->
  <g stroke="#E8725C" stroke-linecap="round" fill="none" opacity="0.1">
    
    <!-- Top Wave (Thicker, more pronounced) -->
    <path d="M -20 120 Q 80 40, 180 140 T 400 120" stroke-width="4" opacity="0.08" />
    
    <!-- Middle Wave (Standard thickness) -->
    <path d="M 0 150 Q 100 70, 200 170 T 440 140" stroke-width="2" />
    
    <!-- Bottom Wave (Dashed, fading out) -->
    <path d="M 30 180 Q 130 100, 230 200 T 480 160" stroke-width="1.5" stroke-dasharray="8 12" />
    
    <!-- A few tiny isolated wave segments like echoes -->
    <path d="M 50 80 Q 80 60, 110 90" stroke-width="1.5" opacity="0.15" />
    <path d="M 280 200 Q 320 180, 360 210" stroke-width="1.5" />
    
  </g>
  
  <!-- Subtle red background wash behind the waves to anchor them -->
  <path d="M -50 150 Q 80 30, 220 150 T 500 150 L 500 260 L -50 260 Z" fill="#E8725C" opacity="0.04" />

  <!-- Center-Right: Rhythmic Breathing Dots (Yellow) -->
  <!-- A gentle arc of expanding and contracting circles -->
  <g fill="#F5C563" opacity="0.12">
    <circle cx="350" cy="90" r="1.5" />
    <circle cx="380" cy="100" r="2" />
    <circle cx="415" cy="115" r="3" />
    <circle cx="455" cy="130" r="4" />
    <circle cx="500" cy="140" r="5" />
    <circle cx="550" cy="140" r="5" fill="none" stroke="#F5C563" stroke-width="1.5" /> <!-- Hollow accent dot -->
    <circle cx="595" cy="130" r="3" />
    <circle cx="630" cy="115" r="2" />
    <circle cx="660" cy="100" r="1.5" />
  </g>

  <!-- Bottom: Extremely Faint Horizon Line (Grey) -->
  <!-- Grounding the whole composition without intruding -->
  <path d="M 0 205 L 750 205" stroke="#D4CEC8" stroke-width="1" fill="none" opacity="0.08" stroke-dasharray="40 20" stroke-linecap="round" />
  <!-- Underline shadow segment -->
  <path d="M 150 210 L 600 210" stroke="#D4CEC8" stroke-width="2" fill="none" opacity="0.05" />

  <!-- A few abstract "vibe" sparkles scattered around -->
  <circle cx="680" cy="160" r="3" fill="#B8A9C9" opacity="0.15" />
  <circle cx="700" cy="80" r="1.5" fill="#E8725C" opacity="0.12" />
  
  <!-- Abstract cross mark near the waves -->
  <path d="M 220 60 L 220 70 M 215 65 L 225 65" stroke="#F5C563" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.15" />

</svg>

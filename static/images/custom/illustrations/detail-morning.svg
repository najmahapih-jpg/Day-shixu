<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 320" width="100%" height="100%">
  <g stroke="#000000" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Frame -->
    <rect x="20" y="50" width="220" height="230" rx="16" fill="#FFFFFF"/>
    <line x1="20" y1="230" x2="240" y2="230"/>
    
    <!-- Window in background Frontal -->
    <rect x="130" y="80" width="80" height="100" fill="#FFFFFF"/>
    <line x1="130" y1="130" x2="210" y2="130"/>
    <line x1="170" y1="80" x2="170" y2="180"/>
    <path d="M 140 130 A 20 20 0 0 1 180 130 Z" fill="#F4CD34"/>

    <!-- Left Arm Stretching Up Frontal -->
    <!-- Draw it behind the body so it overlaps nicely -->
    <path d="M 80 170 C 60 140, 50 110, 60 80" fill="#E54D51"/>
    <line x1="53" y1="90" x2="70" y2="90"/>
    <circle cx="60" cy="80" r="7" fill="#FFFFFF"/>

    <!-- Right Arm Stretching Up Frontal -->
    <path d="M 140 170 C 160 140, 170 110, 160 80" fill="#E54D51"/>
    <line x1="167" y1="90" x2="150" y2="90"/>
    <circle cx="160" cy="80" r="7" fill="#FFFFFF"/>

    <!-- Torso Frontal: Girl in Red Shirt -->
    <path d="M 70 280 L 70 180 C 70 140, 150 140, 150 180 L 150 280 Z" fill="#E54D51"/>
    
    <!-- Collar & Tie (Perfect Flawless Center) -->
    <path d="M 90 155 L 110 180 L 130 155 Z" fill="#FFFFFF"/>
    <path d="M 105 180 L 115 180 L 112 230 L 110 235 L 108 230 Z" fill="#000000"/>
    <line x1="110" y1="235" x2="110" y2="280"/>
    <line x1="85" y1="185" x2="85" y2="210" stroke-width="2"/>
    <line x1="135" y1="185" x2="135" y2="210" stroke-width="2"/>

    <!-- Head & Neck -->
    <path d="M 100 155 L 100 120 L 120 120 L 120 155 Z" fill="#FFFFFF"/>
    <circle cx="110" cy="100" r="32" fill="#FFFFFF"/>

    <!-- Hair Back/Base -->
    <path d="M 80 110 L 70 190 L 95 190 Z M 140 110 L 150 190 L 125 190 Z" fill="#000000" stroke="none"/>
    <path d="M 80 110 L 70 190 L 95 190 M 140 110 L 150 190 L 125 190" fill="none"/>

    <!-- Hair Front/Bangs (Symmetric curve) -->
    <path d="M 75 105 C 75 50, 145 50, 145 105 C 145 115, 130 100, 110 100 C 90 100, 75 115, 75 105 Z" fill="#000000" stroke="none"/>
    <path d="M 75 105 C 75 50, 145 50, 145 105 C 145 115, 130 100, 110 100 C 90 100, 75 115, 75 105 Z" fill="none"/>

    <!-- Face (Frontal slightly stretching/yawning) -->
    <path d="M 93 108 Q 98 105, 103 108" fill="none" stroke-width="2"/> <!-- Closed L -->
    <path d="M 117 108 Q 122 105, 127 108" fill="none" stroke-width="2"/> <!-- Closed R -->
    <path d="M 110 115 L 106 120 L 110 120" fill="none" stroke-width="2"/>
    <circle cx="110" cy="130" r="4" fill="#000000"/> <!-- Yawn -->

    <!-- Floating Badge (Sun) -->
    <circle cx="60" cy="50" r="32" fill="#FFFFFF"/>
    <circle cx="60" cy="50" r="10" fill="#F4CD34"/>
    <line x1="60" y1="30" x2="60" y2="35"/>
    <line x1="60" y1="65" x2="60" y2="70"/>
    <line x1="40" y1="50" x2="45" y2="50"/>
    <line x1="75" y1="50" x2="80" y2="50"/>
    <line x1="46" y1="36" x2="50" y2="40"/>
    <line x1="70" y1="60" x2="74" y2="64"/>
    <line x1="74" y1="36" x2="70" y2="40"/>
    <line x1="50" y1="60" x2="46" y2="64"/>
  </g>
</svg>

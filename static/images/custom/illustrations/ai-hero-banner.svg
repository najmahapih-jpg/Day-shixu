<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 440">
  <!-- 
    Claude-inspired Editorial Illustration Style
    - ViewBox 750x440 (Aspect ratio ~1.7:1, adapts to aspectFill)
    - Delicate outline (#2D2A26)
    - Deliberately offset, painterly color blocks
    - Abstract, magical but friendly composition
    - Center top focus (Crystal Ball), low safe area for text superposition
    
    Palette (Strict):
    Purple/Crystal: #B8A9C9
    Blue/Data Lines: #7EB8C9
    Yellow/Stars/Bulb/Chart: #F5C563
    Red/Chart: #E8725C
    Green/Chart: #8BA888
    Grey/Stand/Ground: #D4CEC8
    Dark Brown/Lines: #2D2A26
  -->

  <!-- Background Abstract Watercolor-like Splashes -->
  <!-- Gentle desk shadow (Wide and flat to anchor the scene) -->
  <ellipse cx="375" cy="310" rx="180" ry="15" fill="#D4CEC8" opacity="0.25" />
  
  <!-- Subtle purple magical aura behind the ball -->
  <circle cx="375" cy="180" r="140" fill="#B8A9C9" opacity="0.08" />

  <!-- Offset Color Fills -->
  
  <!-- Crystal Ball Fill (Purple, main focus, slightly offset up) -->
  <circle cx="375" cy="176" r="80" fill="#B8A9C9" opacity="0.85" />
  
  <!-- Crystal Ball Stand Fill (Grey) -->
  <path d="M 335 250 L 415 250 L 425 280 L 325 280 Z" fill="#D4CEC8" opacity="0.6" />
  <ellipse cx="375" cy="280" rx="60" ry="6" fill="#D4CEC8" opacity="0.8" />

  <!-- Left: Mini Chart Fill -->
  <rect x="180" y="240" width="16" height="40" rx="2" fill="#E8725C" opacity="0.9" /> <!-- Red -->
  <rect x="210" y="210" width="16" height="70" rx="2" fill="#F5C563" opacity="0.9" /> <!-- Yellow -->
  <rect x="240" y="250" width="16" height="30" rx="2" fill="#8BA888" opacity="0.9" /> <!-- Green -->

  <!-- Right: Lightbulb Fills -->
  <!-- Bulb glass -->
  <circle cx="560" cy="210" r="22" fill="#F5C563" opacity="0.4" />
  <!-- Bulb filament/glow -->
  <circle cx="560" cy="210" r="10" fill="#F5C563" opacity="0.9" />
  <!-- Bulb base -->
  <rect x="550" y="234" width="20" height="20" rx="2" fill="#D4CEC8" opacity="0.7" />

  <!-- Line Art (The delicate hand-drawn structure) -->
  <g stroke="#2D2A26" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    
    <!-- Desk/Ground Line (Simple, disjointed) -->
    <path d="M 80 300 C 200 305, 300 300, 450 305" stroke="#D4CEC8" stroke-width="2.5" />
    <path d="M 400 305 C 500 310, 600 300, 680 300" stroke="#D4CEC8" stroke-width="2" />

    <!-- Center: The Crystal Ball and Stand -->
    <!-- Crystal Glass Sphere -->
    <circle cx="375" cy="180" r="80" />
    
    <!-- Magic / Data Swirls inside the ball (Blue) -->
    <path d="M 320 200 C 350 240, 380 120, 430 180" stroke="#7EB8C9" stroke-width="3" opacity="0.8" />
    <path d="M 310 160 C 340 120, 390 220, 440 140" stroke="#7EB8C9" stroke-width="1.5" opacity="0.6" stroke-dasharray="8 6" />
    
    <!-- Crystal Glint -->
    <path d="M 315 140 A 60 60 0 0 1 345 115" stroke-width="1.5" />

    <!-- Stand -->
    <ellipse cx="375" cy="254" rx="46" ry="6" /> <!-- Top cradle -->
    <path d="M 329 254 L 315 285" />
    <path d="M 421 254 L 435 285" />
    <ellipse cx="375" cy="285" rx="60" ry="10" /> <!-- Base -->

    <!-- Left: Mini Chart -->
    <!-- Chart axes -->
    <path d="M 160 190 L 160 280 L 270 280" />
    
    <!-- Chart bars (Offset from fills) -->
    <rect x="176" y="244" width="16" height="36" rx="1" />
    <rect x="206" y="208" width="16" height="72" rx="1" />
    <rect x="236" y="254" width="16" height="26" rx="1" />
    
    <!-- Hand-drawn data point dots on tops of bars -->
    <circle cx="184" cy="244" r="1.5" fill="#2D2A26" />
    <circle cx="214" cy="208" r="1.5" fill="#2D2A26" />
    <circle cx="244" cy="254" r="1.5" fill="#2D2A26" />

    <!-- Right: Lightbulb -->
    <!-- Bulb Glass Outline -->
    <path d="M 545 235 C 530 220, 535 190, 560 188 C 585 186, 590 220, 575 235 Z" />
    
    <!-- Base Details -->
    <rect x="550" y="235" width="20" height="12" rx="1" />
    <path d="M 552 239 L 568 239 M 552 243 L 568 243" stroke-width="1.5" /> <!-- Screw threads -->
    <path d="M 554 247 C 556 250, 564 250, 566 247" stroke-width="1.5" /> <!-- Bottom contact -->

    <!-- Glowing Filament inside -->
    <path d="M 555 235 L 555 215 L 552 210 M 565 235 L 565 215 L 568 210 M 552 210 Q 560 200, 568 210" stroke-width="1.5" />
    <circle cx="560" cy="208" r="0.5" fill="#2D2A26" stroke="none" />

    <!-- Three energetic rays from bulb -->
    <g stroke="#F5C563" stroke-width="2.5">
      <line x1="560" y1="175" x2="560" y2="160" /> <!-- Top -->
      <line x1="590" y1="195" x2="605" y2="185" /> <!-- Right -->
      <line x1="530" y1="195" x2="515" y2="185" /> <!-- Left -->
    </g>

  </g>

  <!-- Emerging Stars from the Crystal Ball -->
  <!-- Top Center-Left Star -->
  <path d="M 350 70 L 354 80 L 364 80 L 356 86 L 359 96 L 350 90 L 341 96 L 344 86 L 336 80 L 346 80 Z" fill="#F5C563" stroke="none" />
  <path d="M 349 68 L 353 78 L 363 78 L 355 84 L 358 94 L 349 88 L 340 94 L 343 84 L 335 78 L 345 78 Z" stroke="#2D2A26" stroke-width="1.5" stroke-linejoin="round" fill="none" />
  
  <!-- Top Right Star (Smaller, higher) -->
  <path d="M 430 40 L 433 46 L 439 46 L 434 50 L 436 56 L 430 52 L 424 56 L 426 50 L 421 46 L 427 46 Z" fill="#F5C563" stroke="none" opacity="0.8" />
  
  <!-- Mid Right Star (Floating near the glass) -->
  <path d="M 400 90 L 402 94 L 406 94 L 403 97 L 404 101 L 400 98 L 396 101 L 397 97 L 394 94 L 398 94 Z" fill="#F5C563" stroke="none" />
  <!-- Hand-drawn offset outline -->
  <path d="M 399 89 L 401 93 L 405 93 L 402 96 L 403 100 L 399 97 L 395 100 L 396 96 L 393 93 L 397 93 Z" stroke="#2D2A26" stroke-width="1" stroke-linejoin="round" fill="none" opacity="0.6" />

  <!-- Abstract Aesthetic Dots / Magic Dust -->
  <!-- Ascending bubbles/dust from ball -->
  <circle cx="360" cy="100" r="3" fill="#7EB8C9" opacity="0.6" />
  <circle cx="380" cy="65" r="2" fill="#B8A9C9" opacity="0.5" />
  <circle cx="410" cy="115" r="1.5" fill="#E8725C" opacity="0.6" />

  <!-- Left/Right dust motes -->
  <circle cx="160" cy="180" r="2" fill="#D4CEC8" opacity="0.8" />
  <circle cx="280" cy="270" r="1.5" fill="#8BA888" opacity="0.6" />
  <circle cx="600" cy="260" r="2.5" fill="#B8A9C9" opacity="0.4" />
  <circle cx="500" cy="160" r="1.5" fill="#F5C563" opacity="0.6" />

</svg>

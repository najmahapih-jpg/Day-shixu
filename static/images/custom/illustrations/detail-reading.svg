<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 320" width="100%" height="100%">
  <g stroke="#000000" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Frame -->
    <rect x="20" y="50" width="220" height="230" rx="16" fill="#FFFFFF"/>
    
    <!-- Torso Frontal Sitting: Girl in Red Shirt -->
    <path d="M 60 280 C 60 220, 160 220, 160 280 Z" fill="#E54D51"/> <!-- Legs folded -->
    <line x1="60" y1="280" x2="160" y2="280"/>
    <path d="M 70 240 L 70 150 C 70 110, 150 110, 150 150 L 150 240 Z" fill="#E54D51"/>
    
    <!-- Collar & Tie (Flawless center alignment) -->
    <path d="M 95 125 L 110 150 L 125 125 Z" fill="#FFFFFF"/>
    <path d="M 105 150 L 115 150 L 112 195 L 110 200 L 108 195 Z" fill="#000000"/>
    <line x1="110" y1="200" x2="110" y2="240"/>
    <line x1="85" y1="160" x2="85" y2="185" stroke-width="2"/>
    <line x1="135" y1="160" x2="135" y2="185" stroke-width="2"/>

    <!-- Head & Neck -->
    <path d="M 100 125 L 100 100 L 120 100 L 120 125 Z" fill="#FFFFFF"/>
    <circle cx="110" cy="80" r="32" fill="#FFFFFF"/>

    <!-- Hair Back -->
    <path d="M 80 90 L 70 170 L 95 170 Z M 140 90 L 150 170 L 125 170 Z" fill="#000000" stroke="none"/>
    <path d="M 80 90 L 70 170 L 95 170 M 140 90 L 150 170 L 125 170" fill="none"/>

    <!-- Hair Front/Bangs -->
    <path d="M 75 85 C 75 30, 145 30, 145 85 C 145 95, 130 80, 110 80 C 90 80, 75 95, 75 85 Z" fill="#000000" stroke="none"/>
    <path d="M 75 85 C 75 30, 145 30, 145 85 C 145 95, 130 80, 110 80 C 90 80, 75 95, 75 85 Z" fill="none"/>

    <!-- Face (Frontal, balanced) -->
    <circle cx="100" cy="88" r="2.5" fill="#000000" stroke="none"/>
    <circle cx="120" cy="88" r="2.5" fill="#000000" stroke="none"/>
    <path d="M 110 95 L 106 100 L 110 100" fill="none" stroke-width="2"/>
    <path d="M 105 110 Q 110 115, 115 110" fill="none" stroke-width="2"/>

    <!-- Book Reading (Perfectly symmetric overlap in lap) -->
    <path d="M 60 210 L 110 230 L 160 210 L 160 240 L 110 260 L 60 240 Z" fill="#FFFFFF"/>
    <line x1="110" y1="230" x2="110" y2="260"/>
    <line x1="75" y1="225" x2="105" y2="235" stroke-width="2"/>
    <line x1="145" y1="225" x2="115" y2="235" stroke-width="2"/>

    <!-- Arms Holding Book (Symmetric curves) -->
    <!-- Left Arm -->
    <path d="M 65 150 C 50 200, 70 230, 90 220" fill="none" stroke-width="14"/>
    <circle cx="90" cy="220" r="7" fill="#FFFFFF"/>
    <!-- Right Arm -->
    <path d="M 155 150 C 170 200, 150 230, 130 220" fill="none" stroke-width="14"/>
    <circle cx="130" cy="220" r="7" fill="#FFFFFF"/>

    <!-- Floating Badge (Lightbulb) -->
    <circle cx="210" cy="50" r="32" fill="#FFFFFF"/>
    <path d="M 210 32 A 10 10 0 1 1 200 42 C 200 50, 204 50, 204 54 L 216 54 C 216 50, 220 50, 220 42 A 10 10 0 0 1 210 32 Z" fill="#F4CD34"/>
    <line x1="204" y1="58" x2="216" y2="58"/>
    <line x1="206" y1="63" x2="214" y2="63"/>
    <line x1="210" y1="42" x2="210" y2="54"/>
  </g>
</svg>

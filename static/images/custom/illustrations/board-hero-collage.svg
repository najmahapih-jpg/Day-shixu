<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 248">
  <!-- 
    Claude-inspired Editorial Illustration Style (Collage Mode)
    - ViewBox 180x248 (Portrait)
    - Delicate outline (#2D2A26)
    - Deliberately offset, painterly color blocks
    - Abstract, minimalist collage composition
    
    Palette (Strict):
    Red/Pins/Pink Note: #E8725C
    Yellow/Top Note/Star: #F5C563
    Blue/Middle Note: #7EB8C9
    Dark Brown/Lines: #2D2A26
    White/Lines/Icons: #FAF8F5
    Grey/Shadows: #D4CEC8
  -->

  <!-- Layer 1: Bottom Pink (Red with opacity) Note (-3 deg) -->
  <g transform="translate(90, 185) rotate(-3)">
    <!-- Shadow offset -->
    <rect x="-42" y="-22" width="90" height="60" rx="4" fill="#D4CEC8" opacity="0.3" transform="rotate(-2)" />
    <!-- Pinkish Fill (Lightened Red via Fill opacity) -->
    <rect x="-45" y="-25" width="90" height="60" rx="3" fill="#E8725C" opacity="0.75" />
    <!-- Outline -->
    <rect x="-45" y="-25" width="90" height="60" rx="3" stroke="#2D2A26" stroke-width="1.5" fill="none" />
    
    <!-- White Heart Icon -->
    <path d="M -5 -2 C -5 -8, 5 -8, 5 -2 C 5 4, -5 12, -5 12 C -5 12, -15 4, -15 -2 C -15 -8, -5 -8, -5 -2 Z" fill="#FAF8F5" />
    <path d="M -7 -4 C -7 -8, 3 -8, 3 -4 C 3 2, -7 8, -7 8 C -7 8, -17 2, -17 -4 C -17 -8, -7 -8, -7 -4 Z" stroke="#2D2A26" stroke-width="1.5" stroke-linejoin="round" fill="none" />
  </g>

  <!-- Layer 2: Middle Blue Card (3 deg) -->
  <g transform="translate(90, 120) rotate(3)">
    <!-- Shadow offset -->
    <rect x="-38" y="-38" width="80" height="80" rx="4" fill="#D4CEC8" opacity="0.3" transform="rotate(2)" />
    <!-- Blue Fill -->
    <rect x="-40" y="-40" width="80" height="80" rx="2" fill="#7EB8C9" opacity="0.9" />
    <!-- Outline -->
    <path d="M -40 -40 L 40 -40 L 40 40 L -40 40 Z" stroke="#2D2A26" stroke-width="1.5" fill="none" stroke-linejoin="round" />
    
    <!-- White Star Icon -->
    <path d="M 0 -12 L 3 -5 L 10 -5 L 4 0 L 6 8 L 0 3 L -6 8 L -4 0 L -10 -5 L -3 -5 Z" fill="#FAF8F5" />
    <!-- Hand-drawn offset outline -->
    <path d="M -2 -14 L 1 -7 L 8 -7 L 2 -2 L 4 6 L -2 1 L -8 6 L -6 -2 L -12 -7 L -5 -7 Z" stroke="#2D2A26" stroke-width="1.5" stroke-linejoin="round" fill="none" />
  </g>

  <!-- Layer 3: Top Yellow Note (-5 deg) -->
  <g transform="translate(90, 60) rotate(-5)">
    <!-- Shadow offset -->
    <rect x="-48" y="-23" width="100" height="50" rx="4" fill="#D4CEC8" opacity="0.3" transform="rotate(1)" />
    <!-- Yellow Fill -->
    <rect x="-50" y="-25" width="100" height="50" rx="1" fill="#F5C563" opacity="0.95" />
    <!-- Outline -->
    <path d="M -50 -23 C -30 -26, 30 -25, 50 -25 C 50 -5, 50 15, 50 25 L -50 25 Z" stroke="#2D2A26" stroke-width="1.5" fill="none" stroke-linejoin="round" />
    
    <!-- White Horizontal Lines -->
    <line x1="-30" y1="-5" x2="30" y2="-5" stroke="#FAF8F5" stroke-width="2.5" stroke-linecap="round" />
    <line x1="-30" y1="5" x2="20" y2="5" stroke="#FAF8F5" stroke-width="2.5" stroke-linecap="round" />
    
    <!-- Overlapping outlines for lines (Off-register effect) -->
    <line x1="-28" y1="-7" x2="32" y2="-7" stroke="#2D2A26" stroke-width="1.5" stroke-linecap="round" />
    <line x1="-32" y1="3" x2="18" y2="3" stroke="#2D2A26" stroke-width="1.5" stroke-linecap="round" />
  </g>

  <!-- Red Push Pins connecting notes -->
  <!-- Pin 1: Between Top Yellow and Middle Blue -->
  <g transform="translate(68, 80)">
    <!-- Pin shadow -->
    <circle cx="2" cy="3" r="4" fill="#D4CEC8" opacity="0.6" />
    <!-- Red Pin Head -->
    <circle cx="0" cy="0" r="4.5" fill="#E8725C" />
    <circle cx="-1" cy="-1" r="1.5" fill="#FAF8F5" />
    <circle cx="0" cy="0" r="4.5" stroke="#2D2A26" stroke-width="1.5" fill="none" />
    <!-- Minute pin hole dot -->
    <circle cx="1" cy="4" r="0.5" fill="#2D2A26" />
  </g>

  <!-- Pin 2: Between Middle Blue and Bottom Pink -->
  <g transform="translate(125, 145)">
    <!-- Pin shadow -->
    <circle cx="-2" cy="3" r="4" fill="#D4CEC8" opacity="0.6" />
    <!-- Red Pin Head -->
    <circle cx="0" cy="0" r="4" fill="#E8725C" />
    <circle cx="-1" cy="-1" r="1.5" fill="#FAF8F5" />
    <circle cx="0" cy="0" r="4" stroke="#2D2A26" stroke-width="1.5" fill="none" />
    <circle cx="-1" cy="4" r="0.5" fill="#2D2A26" />
  </g>

  <!-- Floating Star & Decals at the top -->
  <!-- Floating Star (Yellow, semi-transparent) -->
  <path d="M 145 25 L 148 33 L 156 33 L 149 38 L 152 46 L 145 41 L 138 46 L 141 38 L 134 33 L 142 33 Z" fill="#F5C563" opacity="0.6" transform="rotate(15 145 35)" />
  
  <path d="M 40 30 Q 42 30 42 28 Q 42 30 44 30 Q 42 30 42 32 Q 42 30 40 30 Z" fill="#7EB8C9" opacity="0.5" />
  
  <circle cx="120" cy="20" r="2" fill="#E8725C" opacity="0.4" />

  <!-- A tiny piece of visible tape (Abstract grey stroke) -->
  <path d="M 80 32 L 105 35 L 100 40 L 75 37 Z" fill="#D4CEC8" opacity="0.4" />

</svg>

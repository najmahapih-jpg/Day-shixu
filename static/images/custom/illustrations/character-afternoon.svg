<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <!-- 3. AFTERNOON: Focused Reading / Cyan Light -->
  <rect width="180" height="180" fill="transparent" />

  <!-- === BACKGROUND VIBE (Cyan Focus) === -->
  <circle cx="150" cy="140" r="15" fill="#A8DADC" opacity="0.6" stroke="#1A1A1A" stroke-width="2" stroke-dasharray="4 4" />
  <path d="M 40 40 L 60 40 M 50 30 L 50 50" stroke="#1A1A1A" stroke-width="2" opacity="0.4" stroke-linecap="round" />

  <!-- === CLOTHING: Slate Blue Suit Jacket & Book === -->
  <path d="M 60 140 L 75 160 L 95 155 L 115 160 L 130 140 Z" fill="#FFFFFF" />
  <path d="M 70 140 L 85 160 L 95 150" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="2" />
  <path d="M 120 140 L 105 160 L 95 150" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="2" />
  <path d="M 95 160 L 95 180" fill="none" stroke="#1A1A1A" stroke-width="2" />

  <path d="M 30 180 L 40 145 L 60 140 L 80 165 L 80 180 Z" fill="#5C95A3" />
  <path d="M 160 180 L 150 145 L 130 140 L 110 165 L 110 180 Z" fill="#5C95A3" />
  <path d="M 50 145 L 60 140 L 80 165 L 80 180 L 30 180 Z" fill="#5C95A3" />
  <path d="M 140 145 L 130 140 L 110 165 L 110 180 L 160 180 Z" fill="#5C95A3" />
  
  <path d="M 30 180 L 40 145 L 60 140 L 80 165 L 80 180" fill="none" stroke="#1A1A1A" stroke-width="3" stroke-linejoin="round" />
  <path d="M 160 180 L 150 145 L 130 140 L 110 165 L 110 180" fill="none" stroke="#1A1A1A" stroke-width="3" stroke-linejoin="round" />
  <path d="M 80 165 L 95 180 M 110 165 L 95 180" fill="none" stroke="#1A1A1A" stroke-width="2" />

  <!-- Arms reading a book -->
  <path d="M 40 145 L 20 120 L 35 110 L 60 140 Z" fill="#5C95A3" />
  <path d="M 40 145 L 20 120 L 35 110 L 60 140" fill="none" stroke="#1A1A1A" stroke-width="2.5" stroke-linejoin="round" />

  <!-- The Book (Sleek Yellow Focus) -->
  <path d="M 15 105 L 45 100 L 55 120 L 25 125 Z" fill="#FFCF36" stroke="#1A1A1A" stroke-width="2.5" stroke-linejoin="round" />
  <path d="M 30 103 L 38 123 M 24 110 L 50 105" fill="none" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round" />
  <path d="M 15 115 L 20 125 L 25 120" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" />

  <!-- === HEAD & SKIN === -->
  <path d="M 75 115 L 75 145 L 105 145 L 105 115 Z" fill="#FFE5D9" />
  <path d="M 75 120 L 75 145 M 105 120 L 105 145" fill="none" stroke="#1A1A1A" stroke-width="2.5" />

  <!-- Youthful Jawline (looking down at book) -->
  <path d="M 55 85 C 55 110, 70 135, 90 140 L 100 143 L 110 138 C 125 130, 135 110, 135 85 C 135 55, 115 45, 95 45 C 75 45, 55 55, 55 85 Z" fill="#FFE5D9" />
  <path d="M 55 85 C 55 110, 70 135, 90 140 L 100 143 L 110 138 C 125 130, 135 110, 135 85" fill="none" stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M 135 85 C 142 85, 142 65, 135 68" fill="#FFE5D9" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round" />

  <!-- === YOUTHFUL FULL HAIR === -->
  <path d="M 50 85 C 40 50, 60 25, 95 25 C 130 25, 145 45, 140 85 C 135 100, 125 110, 120 100 C 130 80, 120 50, 100 50 C 75 50, 60 60, 50 85 Z" fill="#1A1A1A" />
  <path d="M 50 85 C 40 50, 60 25, 95 25 C 130 25, 145 45, 140 85" fill="none" stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
  
  <path d="M 55 60 C 75 75, 90 85, 115 70 C 125 65, 135 65, 130 55 C 120 40, 95 35, 75 40 C 65 43, 60 50, 55 60 Z" fill="#1A1A1A" />
  <path d="M 55 60 C 75 75, 90 85, 115 70 C 125 65, 135 65, 130 55 C 120 40, 95 35, 75 40" fill="none" stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round" />
  <path d="M 115 70 C 125 80, 135 85, 140 75" fill="none" stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round" />
  
  <path d="M 75 55 L 85 65 M 105 45 L 115 55 M 100 35 L 105 45" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" />

  <!-- === YOUTHFUL FACIAL FEATURES === -->
  <!-- Reading Glasses -->
  <circle cx="75" cy="95" r="8" fill="none" stroke="#1A1A1A" stroke-width="2" />
  <circle cx="115" cy="95" r="8" fill="none" stroke="#1A1A1A" stroke-width="2" />
  <path d="M 83 95 L 107 95" fill="none" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round" />

  <!-- Intense brows concentrating -->
  <path d="M 65 85 L 80 87 M 125 85 L 110 87" fill="none" stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round" />

  <!-- Eyes looking down into book -->
  <circle cx="75" cy="97" r="2.5" fill="#1A1A1A" />
  <circle cx="115" cy="97" r="2.5" fill="#1A1A1A" />
  
  <path d="M 95 102 L 95 112 L 90 112" fill="none" stroke="#1A1A1A" stroke-width="2" stroke-linejoin="miter" stroke-linecap="round" />
  <path d="M 90 122 L 100 122" fill="none" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round" />

</svg>

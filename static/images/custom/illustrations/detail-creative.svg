<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 320" width="100%" height="100%">
  <g stroke="#000000" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Frame -->
    <rect x="20" y="50" width="220" height="230" rx="16" fill="#FFFFFF"/>
    <line x1="20" y1="230" x2="240" y2="230"/>
    
    <!-- Easel Frontal -->
    <line x1="80" y1="230" x2="110" y2="100"/>
    <line x1="140" y1="230" x2="110" y2="100"/>
    <rect x="70" y="80" width="80" height="100" rx="4" fill="#FFFFFF"/>
    <path d="M 80 100 Q 100 130 110 90" fill="none" stroke="#E54D51" stroke-width="6"/>
    <path d="M 90 140 Q 120 160 130 130" fill="none" stroke="#94C3D7" stroke-width="6"/>

    <!-- Torso Frontal: Girl in Red Shirt -->
    <path d="M 120 280 L 120 180 C 120 140, 200 140, 200 180 L 200 280 Z" fill="#E54D51"/>
    
    <!-- Collar & Tie (Perfect Flawless Center) -->
    <path d="M 145 155 L 160 180 L 175 155 Z" fill="#FFFFFF"/>
    <path d="M 155 180 L 165 180 L 162 230 L 160 235 L 158 230 Z" fill="#000000"/>
    <line x1="160" y1="235" x2="160" y2="280"/>
    <line x1="135" y1="185" x2="135" y2="210" stroke-width="2"/>
    <line x1="185" y1="185" x2="185" y2="210" stroke-width="2"/>

    <!-- Head & Neck -->
    <path d="M 152 155 L 152 120 L 168 120 L 168 155 Z" fill="#FFFFFF"/>
    <circle cx="160" cy="100" r="32" fill="#FFFFFF"/>

    <!-- Hair Back/Base -->
    <path d="M 130 110 L 120 190 L 145 190 Z M 190 110 L 200 190 L 175 190 Z" fill="#000000" stroke="none"/>
    <path d="M 130 110 L 120 190 L 145 190 M 190 110 L 200 190 L 175 190" fill="none"/>

    <!-- Hair Front/Bangs (Symmetric curve) -->
    <path d="M 125 105 C 125 50, 195 50, 195 105 C 195 115, 180 100, 160 100 C 140 100, 125 115, 125 105 Z" fill="#000000" stroke="none"/>
    <path d="M 125 105 C 125 50, 195 50, 195 105 C 195 115, 180 100, 160 100 C 140 100, 125 115, 125 105 Z" fill="none"/>

    <!-- Face (Frontal) -->
    <circle cx="148" cy="108" r="2.5" fill="#000000" stroke="none"/>
    <circle cx="172" cy="108" r="2.5" fill="#000000" stroke="none"/>
    <path d="M 160 115 L 156 120 L 160 120" fill="none" stroke-width="2"/>
    <path d="M 155 130 Q 160 135, 165 130" fill="none" stroke-width="2"/>

    <!-- Left Arm Holding Palette (Frontal, resting inward) -->
    <path d="M 200 170 C 210 240, 185 240, 180 220" fill="none" stroke-width="14"/>
    <circle cx="180" cy="220" r="7" fill="#FFFFFF"/>
    
    <!-- Right Arm painting (Reaching up from shoulder) -->
    <path d="M 120 170 C 110 200, 95 160, 110 130" fill="none" stroke-width="14"/>
    <!-- Brush -->
    <line x1="105" y1="135" x2="95" y2="125" stroke-width="4"/>
    <circle cx="110" cy="130" r="7" fill="#FFFFFF"/>

    <!-- Floating Badge (Palette) -->
    <circle cx="210" cy="50" r="32" fill="#FFFFFF"/>
    <ellipse cx="210" cy="50" rx="16" ry="12" fill="#E54D51" stroke="#000000" stroke-width="3" transform="rotate(-15 210 50)"/>
    <circle cx="204" cy="48" r="2.5" fill="#FFFFFF" stroke="none"/>
    <circle cx="216" cy="48" r="2.5" fill="#F4CD34" stroke="none"/>
  </g>
</svg>

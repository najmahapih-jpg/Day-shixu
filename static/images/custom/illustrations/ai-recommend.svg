    <path d="M 140 10 L 150 50 L 190 40 L 170 70 L 210 90 L 170 110 L 190 140 L 150 130 L 140 170 L 130 130 L 90 140 L 110 110 L 70 90 L 110 70 L 90 40 L 130 50 Z" fill="#F4CD34" opacity="0.3" transform="translate(0, 55) scale(1.1)"/>

    <!-- Target / Bullseye Board Base -->

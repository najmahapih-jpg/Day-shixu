<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 320" width="100%" height="100%">
  <g stroke="#000000" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Frame -->
    <rect x="20" y="50" width="220" height="230" rx="16" fill="#FFFFFF"/>
    
    <!-- Motion lines -->
    <line x1="30" y1="180" x2="60" y2="180"/>
    <line x1="40" y1="200" x2="70" y2="200"/>

    <!-- Legs Running Frontal -->
    <path d="M 90 280 L 100 240 L 110 280 Z" fill="#94C3D7"/>
    <path d="M 130 280 L 140 240 L 160 280 Z" fill="#94C3D7"/>

    <!-- Torso Frontal: Yellow Jacket -->
    <path d="M 70 240 C 70 140, 170 140, 170 240 Z" fill="#F4CD34"/>
    
    <!-- Inner shirt -->
    <path d="M 110 155 L 120 180 L 130 155 Z" fill="#000000"/>
    <!-- Collar Lapels -->
    <path d="M 100 155 L 110 180 L 120 155 Z" fill="#F4CD34"/>
    <path d="M 140 155 L 130 180 L 120 155 Z" fill="#F4CD34"/>
    <!-- Center seam -->
    <line x1="120" y1="180" x2="120" y2="240"/>
    <!-- Side seams -->
    <line x1="90" y1="190" x2="90" y2="220" stroke-width="2"/>
    <line x1="150" y1="190" x2="150" y2="220" stroke-width="2"/>

    <!-- Head & Neck -->
    <path d="M 110 155 L 110 120 L 130 120 L 130 155 Z" fill="#FFFFFF"/>
    <circle cx="120" cy="100" r="32" fill="#FFFFFF"/>
    
    <!-- Hair Frontal -->
    <path d="M 85 110 C 85 55, 155 55, 155 110 C 155 115, 140 95, 120 100 C 100 105, 85 115, 85 110 Z" fill="#000000" stroke="none"/>
    <path d="M 85 110 C 85 55, 155 55, 155 110 C 155 115, 140 95, 120 100 C 100 105, 85 115, 85 110 Z" fill="none"/>

    <!-- Face (Frontal, intense run) -->
    <circle cx="110" cy="108" r="2.5" fill="#000000" stroke="none"/>
    <circle cx="130" cy="108" r="2.5" fill="#000000" stroke="none"/>
    <path d="M 120 115 L 116 120 L 120 120" fill="none" stroke-width="2"/> 
    <path d="M 115 130 Q 120 135, 125 130" fill="none" stroke-width="2"/> 

    <!-- Dynamic Running Arms -->
    <!-- Right Arm bending in -->
    <path d="M 75 160 C 65 190, 80 200, 95 190" fill="none" stroke-width="14"/>
    <circle cx="95" cy="190" r="7" fill="#FFFFFF"/>
    <!-- Left Arm bending back out -->
    <path d="M 165 160 C 175 190, 160 200, 145 190" fill="none" stroke-width="14"/>
    <circle cx="145" cy="190" r="7" fill="#FFFFFF"/>

    <!-- Floating Badge (Dumbbell) -->
    <circle cx="210" cy="50" r="32" fill="#FFFFFF"/>
    <rect x="187" y="46" width="46" height="8" rx="4" fill="#FFFFFF"/>
    <rect x="194" y="35" width="8" height="30" rx="4" fill="#94C3D7"/>
    <rect x="218" y="35" width="8" height="30" rx="4" fill="#94C3D7"/>
  </g>
</svg>

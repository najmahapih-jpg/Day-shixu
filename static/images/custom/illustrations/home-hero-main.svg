<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 360">
  <!-- 
    Claude-inspired Editorial Illustration Style (LOW CONTRAST BACKGROUND MODE)
    - Aspect ratio ~2:1, safe text area in center 50%
    - Delicate outlines changed from dark brown to soft grey (#D4CEC8)
    - Painterly color blocks with very low opacity
    - Abstract, airy composition pushed to the edges
    
    Palette (Strict, low opacity application):
    Red/Pencil: #E8725C
    Yellow/Notebook: #F5C563
    Green/Plant: #8BA888
    Blue/Dots: #7EB8C9
    Purple/Dots: #B8A9C9
    Skin/Cup: #D4A574 (Using pot brown hue for coffee cup rim)
    Grey/Shadows/Lines: #D4CEC8
    Background/Desk: #FAF8F5
  -->

  <!-- Desk Background (Occupies 100%) -->
  <rect width="750" height="360" fill="#FAF8F5" />
  
  <!-- ====== BACKGROUND DECORATIONS (Edges only) ====== -->
  <!-- Top Left: Coffee Cup (over-the-top flat lay) -->
  <g transform="translate(140, 90)">
    <!-- Offset Saucer -->
    <circle cx="-5" cy="5" r="42" fill="#D4CEC8" opacity="0.3" />
    <!-- Saucer Body -->
    <circle cx="0" cy="0" r="40" fill="#FAF8F5" stroke="#D4CEC8" stroke-width="2" />
    <!-- Cup Rim Offset -->
    <circle cx="-3" cy="2" r="30" fill="#D4A574" opacity="0.4" />
    <!-- Cup Rim Outline -->
    <circle cx="0" cy="0" r="30" fill="none" stroke="#D4CEC8" stroke-width="1.5" />
    <!-- Coffee -->
    <circle cx="-1" cy="1" r="26" fill="#D4CEC8" opacity="0.5" />
    <!-- Delicate Steam -->
    <path d="M -10 -25 C -20 -35, -5 -45, -15 -55" stroke="#D4CEC8" stroke-width="1.5" fill="none" opacity="0.7" />
    <path d="M 5 -30 C -5 -40, 10 -50, 0 -60" stroke="#D4CEC8" stroke-width="1.5" fill="none" opacity="0.7" />
  </g>

  <!-- Top Right: Small Open Notebook -->
  <g transform="translate(610, 100) rotate(15)">
    <!-- Yellow Cover Offset -->
    <path d="M -45 -35 L 45 -35 L 45 45 L -45 45 Z" fill="#F5C563" opacity="0.3" />
    <!-- Right Page Shadow -->
    <path d="M 0 -38 L 42 -38 L 42 42 L 0 42 Z" fill="#D4CEC8" opacity="0.2" />
    <!-- White Pages -->
    <path d="M -42 -40 L 0 -40 L 0 40 L -42 40 Z" fill="#FFFFFF" opacity="0.9" />
    <path d="M 42 -40 L 0 -40 L 0 40 L 42 40 Z" fill="#FFFFFF" opacity="0.9" />
    <!-- Outline -->
    <path d="M -40 -38 L 0 -40 L 40 -38 L 40 40 L 0 42 L -40 40 Z" stroke="#D4CEC8" stroke-width="1.5" fill="none" />
    <!-- Center Fold -->
    <line x1="0" y1="-40" x2="0" y2="42" stroke="#D4CEC8" stroke-width="1.5" opacity="0.7" />
    <!-- Abstract Page Lines -->
    <line x1="-30" y1="-25" x2="-10" y2="-25" stroke="#D4CEC8" stroke-width="1" stroke-linecap="round" />
    <line x1="-30" y1="-15" x2="-5" y2="-15" stroke="#D4CEC8" stroke-width="1" stroke-linecap="round" />
    <line x1="-30" y1="-5" x2="-20" y2="-5" stroke="#D4CEC8" stroke-width="1" stroke-linecap="round" />
    <!-- Doodle on right page -->
    <circle cx="20" cy="-10" r="10" stroke="#D4CEC8" stroke-width="1" fill="none" />
  </g>

  <!-- Bottom Left: Pencil -->
  <g transform="translate(160, 270) rotate(-35)">
    <!-- Shadow offset -->
    <rect x="-40" y="-1" width="80" height="8" rx="2" fill="#D4CEC8" opacity="0.3" />
    <!-- Red Body Fill -->
    <rect x="-42" y="-5" width="70" height="8" rx="1.5" fill="#E8725C" opacity="0.4" />
    <!-- Outline -->
    <rect x="-40" y="-4" width="70" height="8" rx="1.5" stroke="#D4CEC8" stroke-width="1.5" fill="none" />
    <!-- Wood tip -->
    <polygon points="30,-4 30,4 45,0" stroke="#D4CEC8" stroke-width="1.5" fill="none" />
    <!-- Lead -->
    <polygon points="41,-1 41,1 45,0" fill="#D4CEC8" opacity="0.8" />
    <!-- Eraser end -->
    <path d="M -40 -4 L -45 -4 C -48 -4, -48 4, -45 4 L -40 4 Z" stroke="#D4CEC8" stroke-width="1.5" fill="#FAF8F5" />
    <!-- Metal band -->
    <line x1="-40" y1="-3" x2="-40" y2="3" stroke="#D4CEC8" stroke-width="1.5" />
  </g>

  <!-- Bottom Right: Small Potted Plant (Top down view) -->
  <g transform="translate(590, 260)">
    <!-- Pot Reflection Offset -->
    <circle cx="-5" cy="5" r="32" fill="#D4CEC8" opacity="0.2" />
    <!-- Pot Rim -->
    <circle cx="0" cy="0" r="30" stroke="#D4CEC8" stroke-width="1.5" fill="#FAF8F5" />
    <!-- Soil -->
    <circle cx="0" cy="0" r="22" fill="#D4CEC8" opacity="0.2" />
    
    <!-- Leaves (Delicate outlines + offset green fills) -->
    <!-- Leaf 1 (Top Left) -->
    <path d="M 0 0 C -20 -15, -40 0, 0 0" fill="#8BA888" opacity="0.3" />
    <path d="M 0 0 C -18 -18, -35 -2, -2 -2" stroke="#D4CEC8" stroke-width="1" fill="none" />
    <path d="M 0 0 L -15 -6" stroke="#D4CEC8" stroke-width="1" />
    
    <!-- Leaf 2 (Top Right) -->
    <path d="M 0 0 C 15 -20, 30 -5, 0 0" fill="#8BA888" opacity="0.4" />
    <path d="M 0 0 C 18 -18, 28 -8, 2 -2" stroke="#D4CEC8" stroke-width="1" fill="none" />
    
    <!-- Leaf 3 (Bottom Right) -->
    <path d="M 0 0 C 20 20, 0 35, 0 0" fill="#8BA888" opacity="0.3" />
    <path d="M 0 0 C 18 18, 2 32, 2 2" stroke="#D4CEC8" stroke-width="1" fill="none" />
    
    <!-- Leaf 4 (Bottom Left) -->
    <path d="M 0 0 C -25 25, -10 35, 0 0" fill="#8BA888" opacity="0.4" />
    <path d="M 0 0 C -22 22, -8 32, -2 2" stroke="#D4CEC8" stroke-width="1" fill="none" />
  </g>

  <!-- Extremely Faint Decorative Dots around the edges -->
  <!-- Left Side -->
  <circle cx="70" cy="180" r="15" fill="#7EB8C9" opacity="0.08" />
  <circle cx="100" cy="150" r="6" fill="#B8A9C9" opacity="0.08" />
  
  <!-- Top Side (Centered-ish but very faint) -->
  <circle cx="280" cy="50" r="10" fill="#B8A9C9" opacity="0.08" />
  <circle cx="480" cy="40" r="20" fill="#7EB8C9" opacity="0.08" />
  
  <!-- Right Side -->
  <circle cx="680" cy="170" r="15" fill="#B8A9C9" opacity="0.08" />
  <circle cx="650" cy="210" r="8" fill="#7EB8C9" opacity="0.08" />
  
  <!-- Bottom Side -->
  <circle cx="250" cy="310" r="12" fill="#7EB8C9" opacity="0.08" />
  <circle cx="420" cy="300" r="8" fill="#B8A9C9" opacity="0.08" />

  <!-- The entire central area (X: 187 to 562, Y: 90 to 270) is 100% clean and empty for text placement -->
</svg>

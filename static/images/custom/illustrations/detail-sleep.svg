<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 320" width="100%" height="100%">
  <g stroke="#000000" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Frame -->
    <rect x="20" y="50" width="220" height="230" rx="16" fill="#FFFFFF"/>
    
    <!-- Zzs -->
    <path d="M 150 75 L 165 75 L 150 90 L 165 90" fill="none" stroke-width="2"/>
    <path d="M 170 60 L 185 60 L 170 75 L 185 75" fill="none" stroke-width="2"/>

    <!-- Desk/Pillow Base -->
    <rect x="40" y="230" width="180" height="60" rx="4" fill="#FFFFFF"/>
    <line x1="60" y1="250" x2="200" y2="250"/>
    <line x1="60" y1="270" x2="200" y2="270"/>

    <!-- Torso Frontal Resting: Blue Shirt -->
    <path d="M 70 280 L 70 180 C 70 140, 170 140, 170 180 L 170 280 Z" fill="#94C3D7"/>
    
    <!-- Collar & Seams -->
    <path d="M 110 165 L 120 180 L 130 165 Z" fill="#FFFFFF"/>
    <line x1="120" y1="180" x2="120" y2="230"/>
    <line x1="90" y1="185" x2="90" y2="210" stroke-width="2"/>
    <line x1="150" y1="185" x2="150" y2="210" stroke-width="2"/>

    <!-- Arms Resting on Desk (Clean overlap) -->
    <!-- Left Arm curving inward -->
    <path d="M 70 190 C 80 230, 130 240, 110 220" fill="none" stroke-width="14"/>
    <circle cx="110" cy="220" r="7" fill="#FFFFFF"/>
    <!-- Right Arm curving inward -->
    <path d="M 170 190 C 160 230, 110 240, 130 220" fill="none" stroke-width="14"/>
    <circle cx="130" cy="220" r="7" fill="#FFFFFF"/>

    <!-- Head & Neck Frontal -->
    <path d="M 115 165 L 115 130 L 125 130 L 125 165 Z" fill="#FFFFFF"/>
    <circle cx="120" cy="115" r="32" fill="#FFFFFF"/>

    <!-- Hair Frontal (Guy swooped/rested) -->
    <path d="M 85 125 C 85 65, 155 65, 155 125 C 155 135, 140 115, 120 115 C 100 115, 85 135, 85 125 Z" fill="#000000" stroke="none"/>
    <path d="M 85 125 C 85 65, 155 65, 155 125 C 155 135, 140 115, 120 115 C 100 115, 85 135, 85 125 Z" fill="none"/>

    <!-- Face Sleeping Frontal -->
    <path d="M 103 125 Q 108 128, 113 125" fill="none" stroke-width="1.5"/> <!-- Eye Closed L -->
    <path d="M 127 125 Q 132 128, 137 125" fill="none" stroke-width="1.5"/> <!-- Eye Closed R -->
    <path d="M 120 135 L 116 142 L 120 142" fill="none" stroke-width="2"/> <!-- Nose -->

    <!-- Floating Badge (Moon) -->
    <circle cx="210" cy="50" r="32" fill="#FFFFFF"/>
    <path d="M 215 35 A 15 15 0 0 0 215 65 A 20 20 0 0 1 215 35 Z" fill="#F4CD34"/>
  </g>
</svg>

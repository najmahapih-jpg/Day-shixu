<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 320" width="100%" height="100%">
  <g stroke="#000000" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Frame -->
    <rect x="20" y="50" width="220" height="230" rx="16" fill="#FFFFFF"/>
    
    <!-- Meditating background rings (perfect centers) -->
    <circle cx="110" cy="140" r="60" fill="none" stroke="#D4CEC8" stroke-width="3"/>
    <circle cx="110" cy="140" r="45" fill="none" stroke="#D4CEC8" stroke-width="3"/>

    <!-- Torso Frontal: Yellow Jacket Guy -->
    <!-- Legs folded -->
    <path d="M 60 280 C 60 220, 160 220, 160 280 Z" fill="#94C3D7"/>
    <line x1="60" y1="280" x2="160" y2="280"/>

    <!-- Jacket Torso -->
    <path d="M 70 240 C 70 140, 150 140, 150 240 Z" fill="#F4CD34"/>
    
    <!-- Inner shirt -->
    <path d="M 100 155 L 110 180 L 120 155 Z" fill="#000000"/>
    <!-- Collar Lapels -->
    <path d="M 90 155 L 100 180 L 110 155 Z" fill="#F4CD34"/>
    <path d="M 130 155 L 120 180 L 110 155 Z" fill="#F4CD34"/>
    <!-- Center seam & seams -->
    <line x1="110" y1="180" x2="110" y2="240"/>
    <line x1="85" y1="190" x2="85" y2="215" stroke-width="2"/>
    <line x1="135" y1="190" x2="135" y2="215" stroke-width="2"/>

    <!-- Head & Neck -->
    <path d="M 100 155 L 100 120 L 120 120 L 120 155 Z" fill="#FFFFFF"/>
    <circle cx="110" cy="100" r="32" fill="#FFFFFF"/>
    
    <!-- Hair Frontal (Guy swooped) -->
    <path d="M 75 110 C 75 50, 145 50, 145 100 C 145 110, 130 90, 110 95 C 90 100, 75 115, 75 110 Z" fill="#000000" stroke="none"/>
    <path d="M 75 110 C 75 50, 145 50, 145 100 C 145 110, 130 90, 110 95 C 90 100, 75 115, 75 110 Z" fill="none"/>

    <!-- Face (Frontal Sleeping/Meditating symmetrically) -->
    <path d="M 93 108 Q 100 110, 103 108" fill="none" stroke-width="2"/> <!-- Closed L -->
    <path d="M 117 108 Q 124 110, 127 108" fill="none" stroke-width="2"/> <!-- Closed R -->
    <path d="M 110 115 L 106 122 L 110 122" fill="none" stroke-width="2"/> <!-- Nose -->

    <!-- Arms Resting on knees -->
    <!-- Left Arm curving out and down -->
    <path d="M 65 160 C 50 200, 60 235, 75 235" fill="none" stroke-width="14"/>
    <circle cx="75" cy="235" r="7" fill="#FFFFFF"/>
    <!-- Right Arm curving out and down -->
    <path d="M 155 160 C 170 200, 160 235, 145 235" fill="none" stroke-width="14"/>
    <circle cx="145" cy="235" r="7" fill="#FFFFFF"/>

    <!-- Floating Badge (Leaf) -->
    <circle cx="210" cy="50" r="32" fill="#FFFFFF"/>
    <path d="M 210 35 C 225 35, 225 65, 210 65 C 195 65, 195 35, 210 35 Z" fill="#94C3D7"/>
    <line x1="210" y1="35" x2="210" y2="65"/>
  </g>
</svg>

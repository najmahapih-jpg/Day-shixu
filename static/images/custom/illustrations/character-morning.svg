<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <!-- 2. MORNING: Energetic Waking Up / Coffee -->
  <rect width="180" height="180" fill="transparent" />

  <!-- === BACKGROUND VIBE (Morning Sun) === -->
  <circle cx="100" cy="80" r="50" fill="#FFCF36" opacity="0.8" stroke="#1A1A1A" stroke-width="2" stroke-dasharray="8 6" />
  <path d="M 20 50 L 30 60 M 30 50 L 20 60" stroke="#1A1A1A" stroke-width="2" opacity="0.4" stroke-linecap="round" />
  <path d="M 160 30 L 155 40 M 165 35 L 150 35" stroke="#1A1A1A" stroke-width="2" opacity="0.4" stroke-linecap="round" />

  <!-- === CLOTHING: Dress Shirt & Loose Tie (Getting Ready) === -->
  <path d="M 50 180 L 70 140 L 100 135 L 130 140 L 140 180 Z" fill="#FFFFFF" />
  <path d="M 85 130 L 100 155 L 105 140 Z" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="2" stroke-linejoin="round" />
  <path d="M 115 130 L 100 155 L 95 140 Z" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="2" stroke-linejoin="round" />
  
  <path d="M 98 152 L 102 152 L 108 180 L 92 180 Z" fill="#1C2D42" />
  <path d="M 95 145 C 100 152, 100 152, 105 145" fill="none" stroke="#1C2D42" stroke-width="3.5" stroke-linecap="round" />

  <path d="M 50 180 L 70 140 L 100 135 L 130 140 L 140 180" fill="none" stroke="#1A1A1A" stroke-width="3" stroke-linejoin="round" />
  <path d="M 70 140 L 65 180 M 130 140 L 135 180" fill="none" stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round" />

  <!-- Right Arm holding coffee -->
  <path d="M 130 140 L 150 115 L 130 95 L 115 105" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="3" stroke-linejoin="round" />
  <path d="M 140 120 C 135 110, 125 105, 115 105" fill="none" stroke="#1A1A1A" stroke-width="2" />

  <!-- The Coffee Cup (Energetic Deep Red) -->
  <path d="M 110 90 L 125 80 L 135 105 L 120 115 Z" fill="#EA3E55" stroke="#1A1A1A" stroke-width="2.5" stroke-linejoin="round" />
  <path d="M 130 85 C 145 80, 150 95, 137 100" fill="none" stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round" />
  <path d="M 115 75 L 115 65 L 125 55 M 125 70 L 125 60 L 135 50" fill="none" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />

  <!-- === HEAD & SKIN === -->
  <path d="M 90 100 L 90 130 L 110 130 L 110 100 Z" fill="#FFE5D9" />
  <path d="M 90 105 L 90 130 M 110 105 L 110 130" fill="none" stroke="#1A1A1A" stroke-width="2.5" />
  <path d="M 95 115 C 100 120, 100 120, 105 115" fill="none" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round" />

  <!-- Sharp Jawline, well-proportioned -->
  <path d="M 60 70 C 60 100, 75 115, 90 120 L 100 123 L 115 118 C 130 110, 140 95, 140 65 C 140 40, 120 35, 100 35 C 80 35, 60 40, 60 70 Z" fill="#FFE5D9" />
  <path d="M 60 70 C 60 100, 75 115, 90 120 L 100 123 L 115 118 C 130 110, 140 95, 140 65" fill="none" stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />

  <path d="M 60 85 C 55 85, 55 65, 60 70" fill="#FFE5D9" stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round" />
  <path d="M 140 80 C 145 80, 145 60, 140 65" fill="#FFE5D9" stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round" />

  <!-- === YOUTHFUL FULL HAIR === -->
  <path d="M 55 70 C 45 40, 70 20, 105 25 C 145 20, 160 50, 150 75 C 145 85, 135 90, 135 80 C 135 50, 120 40, 100 40 C 80 40, 65 50, 60 70 C 60 80, 50 85, 55 70 Z" fill="#1A1A1A" stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round" />
  
  <path d="M 60 65 C 75 80, 95 85, 110 75 C 115 70, 120 60, 120 50 C 100 40, 75 45, 60 65 Z" fill="#1A1A1A" />
  <path d="M 60 65 C 75 80, 95 85, 110 75" fill="none" stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round" />
  
  <path d="M 140 60 C 125 75, 105 80, 90 70 C 85 65, 80 55, 80 45 C 100 35, 125 40, 140 60 Z" fill="#1A1A1A" />
  <path d="M 140 60 C 125 75, 105 80, 90 70" fill="none" stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round" />

  <path d="M 100 45 C 95 30, 90 25, 90 20 M 110 45 C 115 30, 120 25, 120 20" fill="none" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round" />
  <path d="M 85 60 L 90 70 M 115 60 L 110 70" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" />

  <!-- === FACIAL FEATURES === -->
  <path d="M 70 85 L 85 87 M 120 83 L 135 85" fill="none" stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round" />

  <!-- Alive, awake eyes -->
  <circle cx="78" cy="92" r="3" fill="#1A1A1A" />
  <circle cx="125" cy="89" r="3" fill="#1A1A1A" />
  
  <path d="M 102 90 L 102 105 L 97 105" fill="none" stroke="#1A1A1A" stroke-width="2" stroke-linejoin="miter" stroke-linecap="round" />

  <!-- Smirk (Awake, confident) -->
  <path d="M 103 115 C 105 117, 108 117, 110 114" fill="none" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round" />
  <path d="M 103 115 C 100 115, 98 116, 95 118" fill="none" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round" />

</svg>

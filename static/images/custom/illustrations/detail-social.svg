<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 320" width="100%" height="100%">
  <g stroke="#000000" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Frame -->
    <rect x="20" y="50" width="220" height="230" rx="16" fill="#FFFFFF"/>
    <line x1="130" y1="50" x2="130" y2="280"/> <!-- Dividor -->

    <!-- Right Character Frontal (Yellow Jacket Guy) -->
    <path d="M 140 280 L 140 180 C 140 140, 220 140, 220 180 L 220 280 Z" fill="#F4CD34"/>
    
    <path d="M 170 155 L 180 180 L 190 155 Z" fill="#000000"/> <!-- Inner Shirt -->
    <path d="M 160 155 L 170 180 L 180 155 Z" fill="#F4CD34"/>
    <path d="M 200 155 L 190 180 L 180 155 Z" fill="#F4CD34"/>
    <line x1="180" y1="180" x2="180" y2="280"/>
    <line x1="160" y1="185" x2="160" y2="210" stroke-width="2"/>
    <line x1="200" y1="185" x2="200" y2="210" stroke-width="2"/>
    
    <!-- Head Right Frontal -->
    <path d="M 170 155 L 170 120 L 190 120 L 190 155 Z" fill="#FFFFFF"/>
    <circle cx="180" cy="100" r="32" fill="#FFFFFF"/>
    
    <path d="M 145 110 C 145 50, 215 50, 215 100 C 215 110, 200 90, 180 95 C 160 100, 145 115, 145 110 Z" fill="#000000" stroke="none"/>
    <path d="M 145 110 C 145 50, 215 50, 215 100 C 215 110, 200 90, 180 95 C 160 100, 145 115, 145 110 Z" fill="none"/>
    
    <circle cx="168" cy="108" r="2.5" fill="#000000" stroke="none"/>
    <circle cx="192" cy="108" r="2.5" fill="#000000" stroke="none"/>
    <path d="M 180 115 L 176 120 L 180 120" fill="none" stroke-width="2"/>
    <path d="M 175 130 Q 180 135, 185 130" fill="none" stroke-width="2"/>

    <!-- Left Character Frontal (Red Shirt Girl) -->
    <path d="M 40 280 L 40 180 C 40 140, 120 140, 120 180 L 120 280 Z" fill="#E54D51"/>
    
    <path d="M 70 155 L 90 180 L 110 155 Z" fill="#FFFFFF"/> <!-- Collar -->
    <!-- Tie -->
    <path d="M 85 180 L 95 180 L 92 230 L 90 235 L 88 230 Z" fill="#000000"/>
    <line x1="90" y1="235" x2="90" y2="280"/>
    <line x1="60" y1="185" x2="60" y2="210" stroke-width="2"/>
    <line x1="100" y1="185" x2="100" y2="210" stroke-width="2"/>

    <!-- Head Left Frontal -->
    <path d="M 80 155 L 80 120 L 100 120 L 100 155 Z" fill="#FFFFFF"/>
    <circle cx="90" cy="100" r="32" fill="#FFFFFF"/>
    
    <!-- Hair Base -->
    <path d="M 60 110 L 50 190 L 75 190 Z M 120 110 L 130 190 L 105 190 Z" fill="#000000" stroke="none"/>
    <path d="M 60 110 L 50 190 L 75 190 M 120 110 L 130 190 L 105 190" fill="none"/>
    <!-- Hair Bangs -->
    <path d="M 55 105 C 55 50, 125 50, 125 105 C 125 115, 110 100, 90 100 C 70 100, 55 115, 55 105 Z" fill="#000000" stroke="none"/>
    <path d="M 55 105 C 55 50, 125 50, 125 105 C 125 115, 110 100, 90 100 C 70 100, 55 115, 55 105 Z" fill="none"/>
    
    <circle cx="78" cy="108" r="2.5" fill="#000000" stroke="none"/>
    <circle cx="102" cy="108" r="2.5" fill="#000000" stroke="none"/>
    <path d="M 90 115 L 86 120 L 90 120" fill="none" stroke-width="2"/>
    <path d="M 85 130 Q 90 135, 95 130" fill="none" stroke-width="2"/>

    <!-- Phones Interaction (Flawlessly bent arms meeting in center) -->
    <!-- Girl's Right Arm -->
    <path d="M 120 170 C 130 220, 120 230, 105 220" fill="none" stroke-width="14"/>
    <circle cx="105" cy="220" r="7" fill="#FFFFFF"/>
    <rect x="95" y="195" width="16" height="30" rx="3" fill="#000000" transform="rotate(-20 103 210)"/>

    <!-- Guy's Left Arm -->
    <path d="M 140 170 C 130 220, 140 230, 155 220" fill="none" stroke-width="14"/>
    <circle cx="155" cy="220" r="7" fill="#FFFFFF"/>
    <rect x="145" y="195" width="16" height="30" rx="3" fill="#000000" transform="rotate(20 153 210)"/>

    <!-- Floating Badge (News type icon) -->
    <circle cx="210" cy="50" r="32" fill="#FFFFFF"/>
    <path d="M 190 35 L 230 35 A 5 5 0 0 1 235 40 L 235 55 A 5 5 0 0 1 230 60 L 210 60 L 195 70 L 195 60 A 5 5 0 0 1 190 55 Z" fill="#94C3D7"/>
    <line x1="198" y1="45" x2="225" y2="45"/>
    <line x1="198" y1="52" x2="220" y2="52"/>
  </g>
</svg>

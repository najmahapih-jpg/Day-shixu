<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 320" width="100%" height="100%">
  <g stroke="#000000" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Frame -->
    <rect x="20" y="50" width="220" height="230" rx="16" fill="#FFFFFF"/>
    
    <!-- Table Frontal -->
    <rect x="130" y="180" width="70" height="10" rx="2" fill="#FFFFFF"/>
    <line x1="140" y1="190" x2="140" y2="280"/>
    <line x1="190" y1="190" x2="190" y2="280"/>
    
    <!-- Salad Bowl on table -->
    <path d="M 145 170 C 145 190, 185 190, 185 170 Z" fill="#FFFFFF"/>
    <circle cx="155" cy="170" r="10" fill="#E54D51" stroke="none"/>
    <circle cx="170" cy="170" r="10" fill="#F4CD34" stroke="none"/>
    <path d="M 145 170 L 185 170" fill="none"/>

    <!-- Target Character (Blue Shirt Guy Frontal) -->
    <path d="M 60 280 L 60 170 C 60 130, 140 130, 140 170 L 140 280 Z" fill="#94C3D7"/>
    
    <!-- Shirt details (Collar & Seams) -->
    <path d="M 90 155 L 100 180 L 110 155 Z" fill="#FFFFFF"/>
    <line x1="100" y1="180" x2="100" y2="280"/>
    <line x1="80" y1="185" x2="80" y2="210" stroke-width="2"/>
    <line x1="120" y1="185" x2="120" y2="210" stroke-width="2"/>

    <!-- Head & Neck -->
    <path d="M 90 155 L 90 120 L 110 120 L 110 155 Z" fill="#FFFFFF"/>
    <circle cx="100" cy="100" r="32" fill="#FFFFFF"/>
    
    <!-- Hair Frontal (Guy bushy/curly top) -->
    <path d="M 65 110 C 65 50, 135 50, 135 110 C 135 120, 120 100, 100 100 C 80 100, 65 120, 65 110 Z" fill="#000000" stroke="none"/>
    <path d="M 65 110 C 65 50, 135 50, 135 110 C 135 120, 120 100, 100 100 C 80 100, 65 120, 65 110 Z" fill="none"/>
    
    <!-- Face Frontal -->
    <circle cx="88" cy="108" r="2.5" fill="#000000" stroke="none"/>
    <circle cx="112" cy="108" r="2.5" fill="#000000" stroke="none"/>
    <path d="M 100 115 L 96 120 L 100 120" fill="none" stroke-width="2"/> 
    <path d="M 95 130 Q 100 135, 105 130" fill="none" stroke-width="2"/>

    <!-- Right Arm reaching to table (Frontal crossing gracefully) -->
    <path d="M 135 170 C 150 200, 160 160, 150 145" fill="none" stroke-width="14"/>
    <circle cx="150" cy="145" r="7" fill="#FFFFFF"/>

    <!-- Left Arm down straight -->
    <path d="M 60 170 C 50 210, 60 230, 75 220" fill="none" stroke-width="14"/>
    <circle cx="75" cy="220" r="7" fill="#FFFFFF"/>

    <!-- Floating Badge (Fork & Knife) -->
    <circle cx="210" cy="50" r="32" fill="#FFFFFF"/>
    <line x1="200" y1="35" x2="200" y2="65"/>
    <path d="M 195 35 L 195 45 Q 200 50 205 45 L 205 35 M 200 35 L 200 45" fill="none"/> <!-- Fork -->
    <line x1="220" y1="35" x2="220" y2="65"/>
    <path d="M 220 35 C 225 40, 225 50, 220 55" fill="none"/> <!-- Knife -->
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 168 72">
  <!-- 
    Claude-inspired Editorial Illustration Style (Sticker Mode)
    - ViewBox 168x72
    - Delicate outline (#2D2A26)
    - Deliberately offset, painterly color blocks
    - Abstract, minimalist sticker composition
    - Centered with safe margins
    
    Palette:
    Blue/Box: #7EB8C9
    Red/Ribbon/Bow: #E8725C
    Yellow/Star: #F5C563
    Dark Brown/Lines: #2D2A26
  -->

  <!-- Offset Color Fills -->
  <!-- Box Base Fill (Blue) -->
  <rect x="72" y="32" width="24" height="20" rx="2" fill="#7EB8C9" opacity="0.9" />
  <!-- Box Lid Fill (Slightly lighter/offset) -->
  <rect x="68" y="24" width="32" height="8" rx="2" fill="#7EB8C9" opacity="0.7" />
  
  <!-- Ribbon Fills (Red) -->
  <!-- Vertical -->
  <rect x="82" y="24" width="4" height="28" fill="#E8725C" opacity="0.95" />
  
  <!-- Big Cute Bow Tie Fills (Red) -->
  <!-- Left loop -->
  <path d="M 84 24 C 74 12, 60 20, 78 26 Z" fill="#E8725C" opacity="0.9" />
  <!-- Right loop -->
  <path d="M 84 24 C 94 12, 108 20, 90 26 Z" fill="#E8725C" opacity="0.9" />

  <!-- Shadow under the box -->
  <ellipse cx="84" cy="53" rx="16" ry="2" fill="#D4CEC8" opacity="0.5" />

  <!-- Line Art (The delicate hand-drawn structure) -->
  <g stroke="#2D2A26" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    
    <!-- Gift Box Base -->
    <rect x="74" y="32" width="20" height="18" rx="1" />
    
    <!-- Gift Box Lid (Overlapping) -->
    <rect x="70" y="24" width="28" height="8" rx="1" stroke-width="1.5" />
    
    <!-- Ribbon Cross Lines -->
    <!-- Vertical on base -->
    <line x1="82" y1="32" x2="82" y2="50" stroke-width="1.5" />
    <line x1="86" y1="32" x2="86" y2="50" stroke-width="1.5" />
    <!-- Vertical on lid -->
    <line x1="82" y1="24" x2="82" y2="32" stroke-width="1.5" />
    <line x1="86" y1="24" x2="86" y2="32" stroke-width="1.5" />
    <!-- Horizontal on base (Optional, keeping it simple without is cleaner) -->
    <!-- <line x1="74" y1="42" x2="94" y2="42" stroke-width="1.5" /> -->
    
  </g>

  <!-- Bow tie drawn over everything for emphasis -->
  <g stroke="#2D2A26" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Left Loop -->
    <path d="M 82 24 C 70 14, 66 22, 78 26" />
    <!-- Center Ribbon tail left -->
    <path d="M 78 26 C 74 30, 70 32, 66 32" stroke-width="1" />
    
    <!-- Right Loop -->
    <path d="M 86 24 C 98 14, 102 22, 90 26" />
    <!-- Center Ribbon tail right -->
    <path d="M 90 26 C 94 30, 98 32, 102 32" stroke-width="1" />
    
    <!-- Center Knot -->
    <circle cx="84" cy="24" r="2" fill="#2D2A26" />
  </g>

  <!-- Little Star (Top Right) -->
  <path d="M 112 18 L 114 23 L 119 23 L 115 26 L 116 31 L 112 28 L 108 31 L 109 26 L 105 23 L 110 23 Z" fill="#F5C563" stroke="none" />
  <path d="M 111 17 L 113 22 L 118 22 L 114 25 L 115 30 L 111 27 L 107 30 L 108 25 L 104 22 L 109 22 Z" stroke="#2D2A26" stroke-width="1.5" stroke-linejoin="round" fill="none" />

  <!-- Tiny aesthetic dots -->
  <circle cx="60" cy="40" r="1.5" fill="#8BA888" opacity="0.6" />
  <circle cx="100" cy="46" r="1.5" fill="#B8A9C9" opacity="0.5" />

</svg>
